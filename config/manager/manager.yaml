apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: argocd-complementary-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
    spec:
      containers:
        - command:
            - /manager
          args:
            - --leader-elect
          image: "controller"
          name: manager
          env:
            - name: GODEBUG
              value: multipathtcp=0
            # Namespace holding the managed AppProjects and argocd static-user
            # ConfigMap/Secret (also scopes the Secret/ConfigMap caches).
            # Defaults to user-argocd if unset; set here to make it explicit.
            - name: USER_ARGOCD_NAMESPACE
              value: user-argocd
          envFrom:
            - configMapRef:
                name: public-repos
            - configMapRef:
                name: cluster-admin-teams
                optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              # Since v0.5.1 the Secret/ConfigMap caches are scoped to
              # user-argocd (cache.Options.ByObject), so steady-state usage is
              # ~30Mi regardless of cluster size. 512Mi is ample headroom.
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
