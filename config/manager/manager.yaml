apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: argocd-complementary-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
    spec:
      containers:
        - command:
            - /manager
          args:
            - --leader-elect
          image: "controller"
          name: manager
          env:
            - name: GODEBUG
              value: multipathtcp=0
          envFrom:
            - configMapRef:
                name: public-repos
            - configMapRef:
                name: cluster-admin-teams
                optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              # The controllers cache cluster-wide Secrets/ConfigMaps; on a
              # cluster with ~33k secrets the cold-start LIST spike exceeded
              # 512Mi (and 2Gi), OOMKilling a fresh pod. 4Gi covers the spike.
              # TODO: scope the cache (cache.Options.ByObject -> user-argocd)
              # so this no longer scales with total cluster secret count.
              memory: 4Gi
            requests:
              cpu: 100m
              memory: 512Mi
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
